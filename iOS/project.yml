name: SpiceShelf
options:
  bundleIdPrefix: com.shimondeitel.spiceshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SpiceShelf:
    type: application
    platform: iOS
    sources:
      - path: SpiceShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SpiceShelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SpiceShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpiceShelfTests
      - path: SpiceShelf.storekit
    dependencies:
      - target: SpiceShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SpiceShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpiceShelfUITests
    dependencies:
      - target: SpiceShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SpiceShelf:
    build:
      targets:
        SpiceShelf: all
        SpiceShelfTests: [test]
        SpiceShelfUITests: [test]
    test:
      targets:
        - SpiceShelfTests
        - SpiceShelfUITests
